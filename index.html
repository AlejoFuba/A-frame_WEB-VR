<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script> -->
    <!-- version antigua -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>

    <a-assets>
        <img id="obra1" src="./assets/mona-lisa-da-vinci.jpg">
    </a-assets>

    <a-scene>

        <!-- position de camara -->
        <a-entity camera wasd-controls look-controls position="0 1.6 3">
            <a-cursor></a-cursor>
        </a-entity>
        <!-- se añaden eventos de cursor  -->
        <a-box position="-2 1.5 -2" color="blue" event-set__enter="_event: mouseenter; color: yellow"
            event-set__leave="_event: mouseleave; color: blue">
            ></a-box>
        <a-sphere position="2 1.5 -4" color="red"></a-sphere>
        <!-- obra01 -->
        <a-plane src="#obra1" scale="0.5 1 1" position="0 2 -4.9" width="2" height="1.5"
         event-set__enter="_event: mouseenter; scale: 1 2 2"
         event-set__leave="_event: mouseleave; scale: 0.5 1 1"
         onclick="document.querySelector('#infoPanel').setAttribute('visible', true)">
        </a-plane>
        <a-text value="Obra 1 - Autor"
                position="0 1 -4.8"
                align="center"
                color="black">
        </a-text>
        <a-plane id="infoPanel"
                position="0 2 -3"
                width="3"
                height="2"
                color="#FFF"
                visible="false">
        </a-plane>


        <a-plane rotation="-90 0 0" width="10" height="10" color="green"></a-plane>
        <!-- Pared -->
        <a-plane position="0 2 -5" width="10" height="4" color="#FFFFFF"></a-plane>

        <!-- Pared izquierda -->
        <a-plane position="-5 2 0" rotation="0 90 0" width="10" height="4" color="#FFFFFF"></a-plane>

        <!-- Pared derecha -->
        <a-plane position="5 2 0" rotation="0 -90 0" width="10" height="4" color="#FFFFFF"></a-plane>

        <!-- Techo -->
        <a-plane position="0 4 0" rotation="90 0 0" width="10" height="10" color="#EEEEEE"></a-plane>


        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="point" position="0 3 0"></a-light>
        <a-sky color="#ECECEC"></a-sky>
    </a-scene>


</body>

</html>
