<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo VR Leonardo Davinci</title>

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <!-- version antigua -->
    <!-- <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script> -->
     <!-- script de eventos a-frame -->
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
</head>

<body>

    <a-assets>
        <!-- estructura -->
        <img id="techo" src="./assets/Madera_techo.jpg">
        <img id="muros" src="./assets/Piedra_muro.jpg">
        <img id="suelo" src="./assets/Baldosa_madera.jpg">

        <!-- 1. origenes  -->
        <img id="davinci" src="./assets/Leonardo_Davinci.jpg">

        <!-- modelo 3D -->
         <a-asset-item id="invento" src="./assets/da_vinci_tank.glb"></a-asset-item>
         <a-asset-item id="invento_volador" src="./assets/flying_machine.glb"></a-asset-item>

        <!-- <audio id="neigh" src="neigh.mp3"></audio>
        <video id="kentucky-derby" src="derby.mp4"></video> -->
        
    </a-assets>

    <a-scene stats>

        <!-- 
        CAMARA 
         -->
        <a-entity camera look-controls position="0 1.6 3">
            <a-cursor 
                fuse="true" 
                fuse-timeout="1500" 
                raycaster="objects: .interactivo">
            </a-cursor>
        </a-entity>
          <!-- <a-sound src="#neigh"></a-sound>
  <a-entity geometry="primitive: plane" material="src: #kentucky-derby"></a-entity> -->

  <!-- <a-assets timeout="10000"> -->
    <!-- You got until the count of 10 to load else the show will go on without you. -->
    <!-- <img src="bigimage.png">
  </a-assets> -->

        
        <!-- se añaden eventos de cursor  -->
        <a-box class="interactivo" position="-2 1.5 -2" color="blue" event-set__enter="_event: mouseenter; color: yellow"
            event-set__leave="_event: mouseleave; color: blue">
        </a-box>

        <!-- animaciones -->
        

        <a-box 
        class="interactivo"
  position="1.7 1 -0.2"
  color="blue"
  event-set__enter="_event: mouseenter; scale: 1.2 1.2 1.2"
  event-set__leave="_event: mouseleave; scale: 1 1 1"
  onclick="this.setAttribute('color', 'green')">
</a-box>

        <a-sphere class="interactivo" position="2 1.5 -4" color="red" onclick="this.setAttribute('color', 'green')"></a-sphere>
        <!-- obra01 -->
        <a-plane src="#obra1" scale="0.5 1 1" position="0 2 -4.9" width="2" height="1.5"
            event-set__enter="_event: mouseenter; scale: 1 2 2" event-set__leave="_event: mouseleave; scale: 0.5 1 1"
            onclick="document.querySelector('#infoPanel').setAttribute('visible', true)">
        </a-plane>
        </a-text>


        <a-plane src="#suelo" rotation="-90 0 0" width="10" height="10" material="repeat: 4 4"></a-plane>
        <!-- Pared frente-->
        <a-plane src="#muros" position="0 2 -5" width="10" height="4" material="repeat: 2 2"></a-plane>
        <a-text position="-1.5 3 -4.8" align="center" color="black" text="value: Obras maestras">
        </a-text>
        <a-text position="2.6 3 -4.8" align="center" color="black" value="Ciencia y proporción">
        </a-text>
        <!-- pared trasera -->
        <a-plane src="#muros" position="0 2 5" width="10" height="4" rotation="0 180 0" material="repeat: 2 2"></a-plane>

        <!-- Pared izquierda -->
        <a-plane src="#muros" position="-5 2 0" rotation="0 90 0" width="10" height="4" material="repeat: 2 2"></a-plane>
        <a-text position="4.9 3 0" align="center" color="black" text="value: Legado y final de vida" rotation="0 -90 0">
        </a-text>

        <!-- Pared derecha -->
        <a-plane src="#muros" position="5 2 0" rotation="0 -90 0" width="10" height="4" material="repeat: 2 2"></a-plane>
        
        <!-- ingenio y ciencia  -->
        <a-text position="-4.9 2.8 -1.97871" align="center" color="black" text="value: Ingenio y ciencia" rotation="0 90 0">
        </a-text>

        <!-- Techo -->
        <a-plane src="#techo" position="0 4 0" rotation="90 0 0" width="10" height="10" material="repeat: 3 3"></a-plane>

        <!-- 1. ORIGENES  -->
        <!-- Origenes de leonardo -->
        <a-text position="-4.9 2.8 1.4" align="center" color="black" text="value: Origenes de Leonardo" rotation="0 90 0">
        </a-text>
        <a-plane class="interactivo" src="#davinci" position="-4.9 1.7 2.7" rotation="0 90 0" width="1" height="1" material="roughness: 1" geometry="height: 6.12; width: 4.67" scale="0.3 0.3 0.3"
        animation__enter="property: scale; to: 0.4 0.4 0.4; startEvents: mouseenter"
        animation__leave="property: scale; to: 0.3 0.3 0.3; startEvents: mouseleave"></a-plane>

        <!-- inventos -->
         <!-- tanque -->
        <a-entity 
        gltf-model="#invento"
        position="3.4 0 -0.6" scale="20 20 20" rotation="0 45 0"
         animation="property: rotation; to: 0 360 0; loop: true; dur: 20000">
        </a-entity>

        <!-- volador -->
        <a-entity gltf-model="#invento_volador" position="0 3.6 -1.7" rotation="0 0 0" scale="15 15 15"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
        </a-entity>

        <!-- obras -->
       

        <!-- luces -->
        <a-light type="point" position="-3.8 4 2.7" light="angle: 30; color: #ffffd7; decay: 1.2; distance: 5; intensity: 4.2; penumbra: 0.4; type: spot" rotation="-60 90 0"></a-light>
        <a-cylinder position="-4.5 4 2.8" scale="0.1 0.1 0.1" material="emissive: #f5f38b; emissiveIntensity: 3"></a-cylinder>
        <a-light type="point" position="-3.8 4 0" light="angle: 30; color: #ffffd7; decay: 1.2; distance: 5; intensity: 4.2; penumbra: 0.4; type: spot" rotation="-60 90 0"></a-light>
        <a-cylinder position="-4.5 4 0" scale="0.1 0.1 0.1" material="emissive: #f5f38b; emissiveIntensity: 3"></a-cylinder>
        <a-light type="point" position="-3.8 4 -2.7" light="angle: 30; color: #ffffd7; decay: 1.2; distance: 5; intensity: 4.2; penumbra: 0.4; type: spot" rotation="-60 90 0"></a-light>
        <a-cylinder position="-4.5 4 -2.7" scale="0.1 0.1 0.1" material="emissive: #f5f38b; emissiveIntensity: 3"></a-cylinder>

        <a-light type="point" position="2.7 4 -3.8" light="angle: 30; color: #ffffd7; decay: 1.2; distance: 5; intensity: 4.2; penumbra: 0.4; type: spot" rotation="-60 0 0"></a-light>
        <a-cylinder position="2.7 4 -4.5" scale="0.1 0.1 0.1" material="emissive: #f5f38b; emissiveIntensity: 3"></a-cylinder>
        <a-light type="point" position="0 4 -3.8" light="angle: 30; color: #ffffd7; decay: 1.2; distance: 5; intensity: 4.2; penumbra: 0.4; type: spot" rotation="-60 0 0"></a-light>
        <a-cylinder position="0 4 -4.5" scale="0.1 0.1 0.1" material="emissive: #f5f38b; emissiveIntensity: 3"></a-cylinder>
        <a-light type="point" position="-2.7 4 -3.8" light="angle: 30; color: #ffffd7; decay: 1.2; distance: 5; intensity: 4.2; penumbra: 0.4; type: spot" rotation="-60 0 0"></a-light>
        <a-cylinder position="-2.7 4 -4.5" scale="0.1 0.1 0.1" material="emissive: #f5f38b; emissiveIntensity: 3"></a-cylinder>

        <a-light type="point" position="4 4 -2.7" light="angle: 30; color: #ffffd7; decay: 1.2; distance: 5; intensity: 4.2; penumbra: 0.4; type: spot" rotation="-60 -90 0"></a-light>
        <a-cylinder position="4.5 4 -2.7" scale="0.1 0.1 0.1" material="emissive: #f5f38b; emissiveIntensity: 3"></a-cylinder>
        <a-light type="point" position="4 4 0" light="angle: 30; color: #ffffd7; decay: 1.2; distance: 5; intensity: 4.2; penumbra: 0.4; type: spot" rotation="-60 -90 0"></a-light>
        <a-cylinder position="4.5 4 0" scale="0.1 0.1 0.1" material="emissive: #f5f38b; emissiveIntensity: 3"></a-cylinder>
        <a-light type="point" position="4 4 2.7" light="angle: 30; color: #ffffd7; decay: 1.2; distance: 5; intensity: 4.2; penumbra: 0.4; type: spot" rotation="-60 -90 0"></a-light>
        <a-cylinder position="4.5 4 2.7" scale="0.1 0.1 0.1" material="emissive: #f5f38b; emissiveIntensity: 3"></a-cylinder>

        <a-light type="point" position="2.7 4 3.8" light="angle: 30; color: #ffffd7; decay: 1.2; distance: 5; intensity: 4.2; penumbra: 0.4; type: spot" rotation="-60 180 0"></a-light>
        <a-cylinder position="2.7 4 4.5" scale="0.1 0.1 0.1" material="emissive: #f5f38b; emissiveIntensity: 3"></a-cylinder>
        <a-light type="point" position="0 4 3.8" light="angle: 30; color: #ffffd7; decay: 1.2; distance: 5; intensity: 4.2; penumbra: 0.4; type: spot" rotation="-60 180 0"></a-light>
        <a-cylinder position="0 4 4.5" scale="0.1 0.1 0.1" material="emissive: #f5f38b; emissiveIntensity: 3"></a-cylinder>
        <a-light type="point" position="-2.7 4 3.8" light="angle: 30; color: #ffffd7; decay: 1.2; distance: 5; intensity: 4.2; penumbra: 0.4; type: spot" rotation="-60 180 0"></a-light>
        <a-cylinder position="-2.7 4 4.5" scale="0.1 0.1 0.1" material="emissive: #f5f38b; emissiveIntensity: 3"></a-cylinder>

        <a-light type="ambient" intensity="0.5"></a-light>
    </a-scene>

</body>

</html>
