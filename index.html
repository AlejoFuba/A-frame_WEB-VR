<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script> -->
    <!-- version antigua -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
    <a-entity camera look-controls>
      <a-cursor></a-cursor>
    </a-entity>
    <a-scene>
        <!-- se añaden eventos de cursor  -->
      <a-box 
        position="0 1.5 -2" color="blue"
        event-set__enter="_event: mouseenter; color: yellow"
        event-set__leave="_event: mouseleave; color: blue">
      ></a-box>
      <a-sphere position="2 1.5 -4" color="red"></a-sphere>
      <a-plane rotation="-90 0 0" width="10" height="10" color="green"></a-plane>
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
</body>
</html>
